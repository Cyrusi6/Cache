model:
  model_name: Rosetta
  rosetta_config:
    base_model: Qwen/Qwen3-0.6B
    teacher_model: Qwen/Qwen2.5-0.5B-Instruct
    is_do_alignment: false
    alignment_strategy: "longest"
    checkpoints_dir: local/checkpoints/qwen3_0.6b+qwen2.5_0.5b_Fuser/final
  generation_config:
    do_sample: false
    max_new_tokens: 64

output:
  output_dir: local/final_results/baseline_rosetta_fuser/ai2-arc

eval:
  dataset: ai2-arc
  gpu_ids: [2]
  answer_method: generate
  use_cot: false
  use_template: true
  sample_interval: 1
  math_grading_method: "comprehensive"
