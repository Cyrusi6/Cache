apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: c2c-research
  labels: &labels {project: fpct, study: confirmatory, git_sha: __GIT_SHA_SHORT__, seed: "104729", arm: smoke, run_uid: __RUN_UID__}
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      restartPolicy: Never
      containers:
      - name: pretrained-smoke
        image: __IMAGE_DIGEST__
        imagePullPolicy: IfNotPresent
        command: ["/opt/conda/bin/python3.11", "-I", "/opt/fpct/script/runtime/fpct_bootstrap.py"]
        args: ["--repo-root", "/opt/fpct", "--target", "/opt/fpct/script/experiment/fpct_confirmatory_runner.py", "--include-gpu-closure", "--", "pretrained-smoke", "--run-lock", "/opt/fpct-lock/confirmatory_run_lock.json", "--gpu-gate", "/fpct-run/results/gpu_numerical.json", "--output", "/fpct-run/results/pretrained_smoke.json"]
        env:
        - {name: C2C_MODEL_ROOT, value: /models/c2c}
        - {name: HF_HUB_OFFLINE, value: "1"}
        - {name: TRANSFORMERS_OFFLINE, value: "1"}
        resources:
          limits: {nvidia.com/gpu: "1"}
          requests: {nvidia.com/gpu: "1", cpu: "6", memory: 32Gi}
        volumeMounts: &mounts
        - {name: run-lock, mountPath: /opt/fpct-lock, readOnly: true}
        - {name: models, mountPath: /models/c2c, readOnly: true}
        - {name: fpct-run, mountPath: /fpct-run}
      volumes:
      - name: run-lock
        configMap: {name: __RUN_LOCK_CONFIGMAP__}
      - name: models
        hostPath: {path: /netdisk/lijunsi/c2c-route1-identifiability/models, type: Directory}
      - name: fpct-run
        hostPath: {path: /netdisk/lijunsi/fpct-confirmatory/__RUN_UID__, type: Directory}
