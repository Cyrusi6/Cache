apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: c2c-research
  labels: &labels {project: fpct, study: confirmatory, git_sha: __GIT_SHA_SHORT__, seed: "104729", arm: matched-smoke, run_uid: __RUN_UID__}
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      restartPolicy: Never
      containers:
      - name: matched-smoke
        image: __IMAGE_DIGEST__
        imagePullPolicy: IfNotPresent
        command: ["/opt/conda/bin/python", "-I", "/opt/fpct/script/runtime/fpct_bootstrap.py"]
        args: ["--repo-root", "/opt/fpct", "--target", "/opt/fpct/script/experiment/fpct_confirmatory_runner.py", "--include-gpu-closure", "--", "matched-smoke", "--run-lock", "/opt/fpct-lock/confirmatory_run_lock.json", "--output-root", "/fpct-results/__RUN_UID__"]
        env:
        - {name: C2C_MODEL_ROOT, value: /models/c2c}
        - {name: HF_HUB_OFFLINE, value: "1"}
        - {name: TRANSFORMERS_OFFLINE, value: "1"}
        - {name: WANDB_MODE, value: offline}
        resources:
          limits: {nvidia.com/gpu: "2"}
          requests: {nvidia.com/gpu: "2", cpu: "8", memory: 48Gi}
        volumeMounts: &mounts
        - {name: run-lock, mountPath: /opt/fpct-lock, readOnly: true}
        - {name: models, mountPath: /models/c2c, readOnly: true}
        - {name: fpct-results, mountPath: /fpct-results}
        - {name: fpct-assets, mountPath: /fpct-assets, readOnly: true}
      volumes:
      - name: run-lock
        configMap: {name: __RUN_LOCK_CONFIGMAP__}
      - name: models
        persistentVolumeClaim: {claimName: __MODEL_PVC__}
      - name: fpct-results
        persistentVolumeClaim: {claimName: __RESULTS_PVC__}
      - name: fpct-assets
        persistentVolumeClaim: {claimName: __ASSETS_PVC__}
