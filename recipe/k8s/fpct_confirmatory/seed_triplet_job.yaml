apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: c2c-research
  labels: &labels
    project: fpct
    study: confirmatory
    git_sha: __GIT_SHA_SHORT__
    seed: "__SEED__"
    arm: triplet
    run_uid: __RUN_UID__
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      restartPolicy: Never
      nodeSelector: {kubernetes.io/arch: amd64}
      initContainers:
      - name: sealed-probe
        image: __IMAGE_DIGEST__
        imagePullPolicy: IfNotPresent
        command: ["/opt/conda/bin/python", "-I", "/opt/fpct/script/runtime/fpct_bootstrap.py"]
        args: ["--repo-root", "/opt/fpct", "--target", "/opt/fpct/script/experiment/fpct_confirmatory_runner.py", "--include-gpu-closure", "--", "probe", "--run-lock", "/opt/fpct-lock/confirmatory_run_lock.json"]
        volumeMounts: &mounts
        - {name: run-lock, mountPath: /opt/fpct-lock, readOnly: true}
        - {name: models, mountPath: /models/c2c, readOnly: true}
        - {name: fpct-run, mountPath: /fpct-run}
      containers:
      - name: seed-triplet
        image: __IMAGE_DIGEST__
        imagePullPolicy: IfNotPresent
        command: ["/opt/conda/bin/python", "-I", "/opt/fpct/script/runtime/fpct_bootstrap.py"]
        args: ["--repo-root", "/opt/fpct", "--target", "/opt/fpct/script/experiment/fpct_confirmatory_runner.py", "--include-gpu-closure", "--", "train-triplet", "--run-lock", "/opt/fpct-lock/confirmatory_run_lock.json", "--seed", "__SEED__", "--output-root", "/fpct-run/results"]
        env:
        - {name: C2C_MODEL_ROOT, value: /models/c2c}
        - {name: HF_HUB_OFFLINE, value: "1"}
        - {name: TRANSFORMERS_OFFLINE, value: "1"}
        - {name: WANDB_MODE, value: offline}
        resources:
          limits: {nvidia.com/gpu: "2"}
          requests: {nvidia.com/gpu: "2", cpu: "8", memory: 48Gi}
        volumeMounts: *mounts
      volumes:
      - name: run-lock
        configMap: {name: __RUN_LOCK_CONFIGMAP__}
      - name: models
        hostPath: {path: /netdisk/lijunsi/c2c-route1-identifiability/models, type: Directory}
      - name: fpct-run
        hostPath: {path: /netdisk/lijunsi/fpct-confirmatory/__RUN_UID__, type: Directory}
