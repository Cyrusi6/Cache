apiVersion: batch/v1
kind: Job
metadata:
  name: fpct-e0-decode-image-6a51ad4
  namespace: c2c-research
  labels: &labels
    project: fpct
    study: fpct-e0
    run-uid: fpct-e0-20260722-v1
    purpose: decode-image-loader
    execution-sha: "6a51ad4"
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      restartPolicy: Never
      nodeName: 4090-48gx2
      containers:
      - name: loader
        image: busybox:1.36.1
        securityContext: {privileged: true}
        command:
        - sh
        - -c
        - >-
          /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images import /fpct-e0/assets/fpct-e0-decode-6a51ad4.tar &&
          /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images tag docker.io/library/fpct-e0-decode:6a51ad4 docker.io/library/fpct-e0-decode@sha256:19c7a81568b4701fa60f11c682423d9eb812fe6e8f95bcfc36aa21eb98e82683
        volumeMounts:
        - {name: e0-results, mountPath: /fpct-e0, readOnly: true}
        - {name: k3s-bin, mountPath: /host/k3s, readOnly: true}
        - {name: containerd-sock, mountPath: /run/k3s/containerd/containerd.sock}
      volumes:
      - name: e0-results
        hostPath: {path: /netdisk/lijunsi/fpct-e0/fpct-e0-20260722-v1, type: Directory}
      - name: k3s-bin
        hostPath: {path: /usr/local/bin/k3s, type: File}
      - name: containerd-sock
        hostPath: {path: /run/k3s/containerd/containerd.sock, type: Socket}
