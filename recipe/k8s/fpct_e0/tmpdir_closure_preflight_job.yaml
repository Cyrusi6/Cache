apiVersion: batch/v1
kind: Job
metadata:
  name: fpct-e0-tmpdir-closure-preflight-__EXECUTION_SHORT__
  namespace: c2c-research
  labels: &labels
    project: fpct
    study: fpct-e0
    exploratory: "true"
    confirmatory: "false"
    eligible-for-formal-statistics: "false"
    run-uid: fpct-e0-20260722-v1
    purpose: tmpdir-closure-preflight
    execution-sha: __EXECUTION_SHORT__
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: *labels
    spec:
      nodeName: 4090-48gx2
      restartPolicy: Never
      containers:
      - name: preflight
        image: docker.io/library/fpct-gpu-r2m:80fb295@sha256:0ea40657a38dbe8778ef492474f28ef2360156f4c9b0f8287e2bb0988d695851
        imagePullPolicy: IfNotPresent
