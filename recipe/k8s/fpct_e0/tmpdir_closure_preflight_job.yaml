      volumes:
      - name: recovery-code
        configMap: {name: __RECOVERY_CONFIGMAP__}
      - name: e0-results
        hostPath: {path: /netdisk/lijunsi/fpct-e0/fpct-e0-20260722-v1, type: Directory}
