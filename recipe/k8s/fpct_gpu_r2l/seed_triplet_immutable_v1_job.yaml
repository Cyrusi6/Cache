apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: c2c-research
  labels: &labels {project: fpct, study: confirmatory-r2l, git_sha: "43b825b3", seed: "__SEED__", arm: triplet, run_uid: fpct-r2l-43b825b-v1}
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      restartPolicy: Never
      nodeName: 4090-48gx2
      containers:
      - name: seed-triplet
        image: docker.io/library/fpct-gpu-r2l:43b825b@sha256:e805c714f4a77be82fe89e36a100750ba25ad815b5af004d6f9ae4233f37492e
        imagePullPolicy: IfNotPresent
        command: ["bash", "-lc"]
        args:
        - |
          set -euo pipefail
          /opt/conda/bin/python3.11 -c 'import json; p=json.load(open("/fpct-run/results/immutable_final.json")); s=json.load(open("/fpct-run/results/diagnostic_seed_104729/matched_smoke_manifest.json")); assert p["status"] == "GO" and p["training_authorized"] is True and s["status"] == "GO"'
          /opt/conda/bin/python3.11 -I /opt/fpct/script/runtime/fpct_bootstrap.py \
            --repo-root /opt/fpct \
            --target /opt/fpct/script/experiment/fpct_confirmatory_runner.py \
            --include-gpu-closure \
            --attestation-out /fpct-run/attestations/seed___SEED__.json \
            -- train-triplet \
            --run-lock /opt/fpct-lock/immutable_v1_run_lock.json \
            --seed __SEED__ \
            --output-root /fpct-run/results
        env:
        - {name: C2C_MODEL_ROOT, value: /models/c2c}
        - {name: HF_HUB_OFFLINE, value: "1"}
        - {name: TRANSFORMERS_OFFLINE, value: "1"}
        - {name: WANDB_MODE, value: offline}
        - {name: WANDB_DIR, value: /fpct-run/wandb}
        - {name: WANDB_CACHE_DIR, value: /fpct-run/wandb-cache}
        - {name: WANDB_CONFIG_DIR, value: /fpct-run/wandb-config}
        - {name: WANDB_DATA_DIR, value: /fpct-run/wandb-data}
        resources:
          limits: {nvidia.com/gpu: "2"}
          requests: {nvidia.com/gpu: "2", cpu: "8", memory: 64Gi}
        volumeMounts:
        - {name: run-lock, mountPath: /opt/fpct-lock, readOnly: true}
        - {name: models, mountPath: /models/c2c, readOnly: true}
        - {name: fpct-run, mountPath: /fpct-run}
      volumes:
      - name: run-lock
        configMap: {name: fpct-r2l-lock-43b825b-v1}
      - name: models
        hostPath: {path: /netdisk/lijunsi/c2c-route1-identifiability/models, type: Directory}
      - name: fpct-run
        hostPath: {path: /netdisk/lijunsi/fpct-confirmatory/fpct-r2l-43b825b-v1, type: Directory}
