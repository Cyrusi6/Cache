apiVersion: batch/v1
kind: Job
metadata:
  name: fpct-r2l-diag-image-d71d21b
  namespace: c2c-research
  labels: &labels
    project: fpct
    study: r2l-diagnostic
    git_sha: "d71d21b1"
    seed: diagnostic
    arm: image-loader
    run_uid: fpct-r2l-diag-d71d21b-v1
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      nodeName: 4090-48gx2
      restartPolicy: Never
      containers:
      - name: loader
        image: busybox:1.36.1
        securityContext: {privileged: true}
        command: ["sh", "-c", "/host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images import /fpct-run/assets/fpct-gpu-r2l-diag-d71d21b.tar && /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images tag docker.io/library/fpct-gpu-r2l-diag:d71d21b docker.io/library/fpct-gpu-r2l-diag:d71d21b@sha256:ef04b033a2038125166e10bd71699bf7222ce7e1b8217cb4e965b752eff194a7 && /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images tag docker.io/library/fpct-gpu-r2l-diag:d71d21b docker.io/library/fpct-gpu-r2l-diag@sha256:ef04b033a2038125166e10bd71699bf7222ce7e1b8217cb4e965b752eff194a7"]
        volumeMounts:
        - {name: k3s, mountPath: /host/k3s, readOnly: true}
        - {name: containerd, mountPath: /run/k3s/containerd}
        - {name: fpct-run, mountPath: /fpct-run, readOnly: true}
      volumes:
      - name: k3s
        hostPath: {path: /usr/local/bin/k3s, type: File}
      - name: containerd
        hostPath: {path: /run/k3s/containerd, type: Directory}
      - name: fpct-run
        hostPath: {path: /netdisk/lijunsi/fpct-confirmatory/fpct-r2l-diag-d71d21b-v1, type: Directory}
