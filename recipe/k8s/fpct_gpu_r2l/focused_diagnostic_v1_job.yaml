apiVersion: batch/v1
kind: Job
metadata:
  name: fpct-r2l-diag-d71d21b
  namespace: c2c-research
  labels: &labels
    project: fpct
    study: r2l-diagnostic
    git_sha: "d71d21b1"
    seed: diagnostic
    arm: focused-semantic-map
    run_uid: fpct-r2l-diag-d71d21b-v1
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      restartPolicy: Never
      nodeName: 4090-48gx2
      containers:
      - name: focused-diagnostic
        image: docker.io/library/fpct-gpu-r2l-diag:d71d21b@sha256:ef04b033a2038125166e10bd71699bf7222ce7e1b8217cb4e965b752eff194a7
        imagePullPolicy: IfNotPresent
        command: ["bash", "-lc"]
        args:
        - |
          set -euo pipefail
          /opt/conda/bin/python3.11 -I /opt/fpct/script/runtime/fpct_bootstrap.py \
            --repo-root /opt/fpct \
            --target /opt/fpct/script/experiment/fpct_gpu_r2l_runner.py \
            --include-gpu-closure \
            --attestation-out /fpct-run/attestations/synthetic.json \
            -- synthetic \
            --output /fpct-run/results/synthetic/synthetic.json
          for dtype in fp32 bf16; do
            for condition in OP01_CPOST_NATIVE OP02_F_NATIVE OP03_F_REP_NATIVE OP04_F_FORCED OP05_F_REP_FORCED; do
              output="/fpct-run/results/conditions/${dtype}/${condition}"
              attest="/fpct-run/attestations/${dtype}_${condition}.json"
              /opt/conda/bin/python3.11 -I /opt/fpct/script/runtime/fpct_bootstrap.py \
                --repo-root /opt/fpct \
                --target /opt/fpct/script/experiment/fpct_gpu_r2_runner.py \
                --include-gpu-closure \
                --attestation-out "$attest" \
                -- operator-condition \
                --run-lock /opt/fpct-lock/diagnostic_v1_run_lock.json \
                --panel /opt/fpct/recipe/eval_recipe/fpct_gpu_r2l/focused_label_free_panel.json \
                --data-root /datasets/c2c \
                --condition "$condition" \
                --dtype "$dtype" \
                --output-dir "$output"
            done
          done
          /opt/conda/bin/python3.11 -I /opt/fpct/script/runtime/fpct_bootstrap.py \
            --repo-root /opt/fpct \
            --target /opt/fpct/script/experiment/fpct_gpu_r2k_latency.py \
            --include-gpu-closure \
            --attestation-out /fpct-run/attestations/latency_block_00.json \
            -- block \
            --run-lock /opt/fpct-lock/diagnostic_v1_run_lock.json \
            --panel /opt/fpct/recipe/eval_recipe/fpct_gpu_r2l/focused_label_free_panel.json \
            --data-root /datasets/c2c \
            --block-index 0 \
            --output /fpct-run/results/latency/block_00.json
          /opt/conda/bin/python3.11 -I /opt/fpct/script/runtime/fpct_bootstrap.py \
            --repo-root /opt/fpct \
            --target /opt/fpct/script/experiment/fpct_gpu_r2k_latency.py \
            --include-gpu-closure \
            --attestation-out /fpct-run/attestations/trace.json \
            -- trace \
            --run-lock /opt/fpct-lock/diagnostic_v1_run_lock.json \
            --panel /opt/fpct/recipe/eval_recipe/fpct_gpu_r2l/focused_label_free_panel.json \
            --data-root /datasets/c2c \
            --output-root /fpct-run/results/traces
          /opt/conda/bin/python3.11 -I /opt/fpct/script/runtime/fpct_bootstrap.py \
            --repo-root /opt/fpct \
            --target /opt/fpct/script/experiment/fpct_gpu_r2l_runner.py \
            --include-gpu-closure \
            --attestation-out /fpct-run/attestations/aggregate.json \
            -- aggregate \
            --conditions-root /fpct-run/results \
            --floors /fpct-prior/gpu_gate/metric_null_floors.json \
            --synthetic /fpct-run/results/synthetic/synthetic.json \
            --latency-block /fpct-run/results/latency/block_00.json \
            --trace-root /fpct-run/results/traces \
            --output /fpct-run/results/focused_aggregate.json
        env:
        - {name: C2C_MODEL_ROOT, value: /models/c2c}
        - {name: HF_HUB_OFFLINE, value: "1"}
        - {name: TRANSFORMERS_OFFLINE, value: "1"}
        - {name: TOKENIZERS_PARALLELISM, value: "false"}
        - {name: NODE_NAME, valueFrom: {fieldRef: {fieldPath: spec.nodeName}}}
        - {name: POD_NAME, valueFrom: {fieldRef: {fieldPath: metadata.name}}}
        resources:
          limits: {nvidia.com/gpu: "1"}
          requests: {nvidia.com/gpu: "1", cpu: "8", memory: 64Gi}
        volumeMounts:
        - {name: run-lock, mountPath: /opt/fpct-lock, readOnly: true}
        - {name: models, mountPath: /models/c2c, readOnly: true}
        - {name: datasets, mountPath: /datasets/c2c, readOnly: true}
        - {name: prior, mountPath: /fpct-prior, readOnly: true}
        - {name: fpct-run, mountPath: /fpct-run}
      volumes:
      - name: run-lock
        configMap: {name: fpct-r2l-diag-lock-d71d21b-v1}
      - name: models
        hostPath: {path: /netdisk/lijunsi/c2c-route1-identifiability/models, type: Directory}
      - name: datasets
        hostPath: {path: /netdisk/lijunsi/c2c-route1-identifiability/data/c2c, type: Directory}
      - name: prior
        hostPath: {path: /netdisk/lijunsi/fpct-confirmatory/fpct-r2k-458b026-v1/results, type: Directory}
      - name: fpct-run
        hostPath: {path: /netdisk/lijunsi/fpct-confirmatory/fpct-r2l-diag-d71d21b-v1, type: Directory}
