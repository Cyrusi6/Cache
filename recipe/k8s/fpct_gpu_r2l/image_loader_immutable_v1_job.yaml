apiVersion: batch/v1
kind: Job
metadata:
  name: fpct-r2l-image-43b825b
  namespace: c2c-research
  labels: &labels
    project: fpct
    study: confirmatory-r2l
    git_sha: "43b825b3"
    seed: infrastructure
    arm: image-loader
    run_uid: fpct-r2l-43b825b-v1
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      restartPolicy: Never
      nodeName: 4090-48gx2
      containers:
      - name: loader
        image: busybox:1.36.1
        securityContext: {privileged: true}
        command: ["sh", "-c", "/host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images import /fpct-run/assets/fpct-gpu-r2l-43b825b.tar && /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images tag docker.io/library/fpct-gpu-r2l:43b825b docker.io/library/fpct-gpu-r2l:43b825b@sha256:e805c714f4a77be82fe89e36a100750ba25ad815b5af004d6f9ae4233f37492e && /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images tag docker.io/library/fpct-gpu-r2l:43b825b docker.io/library/fpct-gpu-r2l@sha256:e805c714f4a77be82fe89e36a100750ba25ad815b5af004d6f9ae4233f37492e"]
        volumeMounts:
        - {name: fpct-run, mountPath: /fpct-run, readOnly: true}
        - {name: k3s-bin, mountPath: /host/k3s, readOnly: true}
        - {name: containerd-sock, mountPath: /run/k3s/containerd/containerd.sock}
      volumes:
      - name: fpct-run
        hostPath: {path: /netdisk/lijunsi/fpct-confirmatory/fpct-r2l-43b825b-v1, type: Directory}
      - name: k3s-bin
        hostPath: {path: /usr/local/bin/k3s, type: File}
      - name: containerd-sock
        hostPath: {path: /run/k3s/containerd/containerd.sock, type: Socket}
