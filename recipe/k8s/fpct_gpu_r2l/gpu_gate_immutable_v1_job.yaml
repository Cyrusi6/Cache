apiVersion: batch/v1
kind: Job
metadata:
  name: fpct-r2l-gpu-43b825b
  namespace: c2c-research
  labels: &labels
    project: fpct
    study: confirmatory-r2l
    git_sha: "43b825b3"
    seed: diagnostic
    arm: gpu-gate
    run_uid: fpct-r2l-43b825b-v1
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      restartPolicy: Never
      nodeName: 4090-48gx2
      containers:
      - name: gpu-gate
        image: docker.io/library/fpct-gpu-r2l:43b825b@sha256:e805c714f4a77be82fe89e36a100750ba25ad815b5af004d6f9ae4233f37492e
        imagePullPolicy: IfNotPresent
        command: ["/opt/conda/bin/python3.11", "-I", "/opt/fpct/script/runtime/fpct_bootstrap.py"]
        args: ["--repo-root", "/opt/fpct", "--target", "/opt/fpct/script/experiment/fpct_gpu_r2_runner.py", "--include-gpu-closure", "--attestation-out", "/fpct-run/attestations/gpu_gate.json", "--", "gpu-gate-sequence", "--run-lock", "/opt/fpct-lock/immutable_v1_run_lock.json", "--floor-spec", "/opt/fpct/recipe/eval_recipe/fpct_gpu_r2/metric_null_floor_spec.json", "--receiver-config", "/models/c2c/Qwen3-0.6B/config.json", "--output-root", "/fpct-run/results/gpu_gate"]
        env: &offline_env
        - {name: C2C_MODEL_ROOT, value: /models/c2c}
        - {name: HF_HUB_OFFLINE, value: "1"}
        - {name: TRANSFORMERS_OFFLINE, value: "1"}
        - {name: TOKENIZERS_PARALLELISM, value: "false"}
        resources:
          limits: {nvidia.com/gpu: "1"}
          requests: {nvidia.com/gpu: "1", cpu: "8", memory: 48Gi}
        volumeMounts: &mounts
        - {name: run-lock, mountPath: /opt/fpct-lock, readOnly: true}
        - {name: models, mountPath: /models/c2c, readOnly: true}
        - {name: fpct-run, mountPath: /fpct-run}
      volumes: &volumes
      - name: run-lock
        configMap: {name: fpct-r2l-lock-43b825b-v1}
      - name: models
        hostPath: {path: /netdisk/lijunsi/c2c-route1-identifiability/models, type: Directory}
      - name: fpct-run
        hostPath: {path: /netdisk/lijunsi/fpct-confirmatory/fpct-r2l-43b825b-v1, type: Directory}
