apiVersion: batch/v1
kind: Job
metadata:
  name: fpct-r2k-image-458b026
  namespace: c2c-research
  labels: &labels
    project: fpct
    study: confirmatory-r2k
    git_sha: "458b0260"
    seed: diagnostic
    arm: image-loader
    run_uid: fpct-r2k-458b026-v1
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      nodeName: 4090-48gx2
      restartPolicy: Never
      containers:
      - name: loader
        image: busybox:1.36.1
        securityContext: {privileged: true}
        command: ["sh", "-c", "/host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images import /fpct-run/assets/fpct-gpu-r2k-458b026.tar && /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images tag docker.io/library/fpct-gpu-r2k:458b026 docker.io/library/fpct-gpu-r2k:458b026@sha256:bc19b894c18eea266596011b748a4a22c73b80788e0fdd4a08b5f33059bf51ca && /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images tag docker.io/library/fpct-gpu-r2k:458b026 docker.io/library/fpct-gpu-r2k@sha256:bc19b894c18eea266596011b748a4a22c73b80788e0fdd4a08b5f33059bf51ca"]
        volumeMounts:
        - {name: k3s, mountPath: /host/k3s, readOnly: true}
        - {name: containerd, mountPath: /run/k3s/containerd}
        - {name: fpct-run, mountPath: /fpct-run, readOnly: true}
      volumes:
      - name: k3s
        hostPath: {path: /usr/local/bin/k3s, type: File}
      - name: containerd
        hostPath: {path: /run/k3s/containerd, type: Directory}
      - name: fpct-run
        hostPath: {path: /netdisk/lijunsi/fpct-confirmatory/fpct-r2k-458b026-v1, type: Directory}
