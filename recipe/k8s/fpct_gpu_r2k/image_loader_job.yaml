apiVersion: batch/v1
kind: Job
metadata:
  name: fpct-r2k-diag-image-458b026
  namespace: c2c-research
  labels: &labels
    project: fpct
    study: r2k-diagnostic
    git_sha: "458b0260"
    seed: diagnostic
    arm: image-loader
    run_uid: fpct-r2k-diag-458b026-v1
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      nodeName: 4090-48gx2
      restartPolicy: Never
      containers:
      - name: loader
        image: busybox:1.36.1
        securityContext: {privileged: true}
        command:
        - sh
        - -c
        - >-
          /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images import /fpct-run/assets/fpct-gpu-r2k-diag-458b026.tar &&
          /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images tag docker.io/library/fpct-gpu-r2k-diag:458b026 docker.io/library/fpct-gpu-r2k-diag@sha256:3a4240bc26610b43737861f46cbee88de5d1552002d03de9f0f9407d71da32e5
        volumeMounts:
        - {name: k3s, mountPath: /host/k3s, readOnly: true}
        - {name: containerd, mountPath: /run/k3s/containerd}
        - {name: fpct-run, mountPath: /fpct-run, readOnly: true}
      volumes:
      - name: k3s
        hostPath: {path: /usr/local/bin/k3s, type: File}
      - name: containerd
        hostPath: {path: /run/k3s/containerd, type: Directory}
      - name: fpct-run
        hostPath: {path: /netdisk/lijunsi/fpct-confirmatory/fpct-r2k-diag-458b026-v1, type: Directory}
