        - {name: containerd-sock, mountPath: /run/k3s/containerd/containerd.sock}
      volumes:
      - name: fpct-run
        hostPath: {path: /netdisk/lijunsi/fpct-confirmatory/fpct-r2m-66e4cdd-v1, type: Directory}
      - name: k3s-bin
        hostPath: {path: /usr/local/bin/k3s, type: File}
      - name: containerd-sock
        hostPath: {path: /run/k3s/containerd/containerd.sock, type: Socket}
