apiVersion: batch/v1
kind: Job
metadata:
  name: fpct-r2m-image-80fb295
  namespace: c2c-research
  labels: &labels {project: fpct, study: confirmatory-r2m, git_sha: "80fb2955", seed: infrastructure, arm: image-loader, run_uid: fpct-r2m-80fb295-v1}
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      restartPolicy: Never
      nodeName: 4090-48gx2
      containers:
      - name: loader
        image: busybox:1.36.1
        securityContext: {privileged: true}
        command: ["sh", "-c", "/host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images import /fpct-run/assets/fpct-gpu-r2m-80fb295.tar && /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images tag docker.io/library/fpct-gpu-r2m:80fb295-final docker.io/library/fpct-gpu-r2m:80fb295@sha256:0ea40657a38dbe8778ef492474f28ef2360156f4c9b0f8287e2bb0988d695851 && /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images tag docker.io/library/fpct-gpu-r2m:80fb295-final docker.io/library/fpct-gpu-r2m@sha256:0ea40657a38dbe8778ef492474f28ef2360156f4c9b0f8287e2bb0988d695851"]
        volumeMounts:
        - {name: fpct-run, mountPath: /fpct-run, readOnly: true}
        - {name: k3s-bin, mountPath: /host/k3s, readOnly: true}
        - {name: containerd-sock, mountPath: /run/k3s/containerd/containerd.sock}
      volumes:
      - name: fpct-run
        hostPath: {path: /netdisk/lijunsi/fpct-confirmatory/fpct-r2m-80fb295-v1, type: Directory}
      - name: k3s-bin
        hostPath: {path: /usr/local/bin/k3s, type: File}
      - name: containerd-sock
        hostPath: {path: /run/k3s/containerd/containerd.sock, type: Socket}
