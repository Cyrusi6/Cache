apiVersion: batch/v1
kind: Job
metadata:
  name: fpct-r2m-image-66e4cdd
  namespace: c2c-research
  labels: &labels {project: fpct, study: confirmatory-r2m, git_sha: "66e4cdd1", seed: infrastructure, arm: image-loader, run_uid: fpct-r2m-66e4cdd-v1}
spec:
  backoffLimit: 0
  template:
    metadata: {labels: *labels}
    spec:
      restartPolicy: Never
      nodeName: 4090-48gx2
      containers:
      - name: loader
        image: busybox:1.36.1
        securityContext: {privileged: true}
        command: ["sh", "-c", "/host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images import /fpct-run/assets/fpct-gpu-r2m-66e4cdd.tar && /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images tag docker.io/library/fpct-gpu-r2m:66e4cdd-final2 docker.io/library/fpct-gpu-r2m:66e4cdd@sha256:a374ca4c24bd25730d71b45346f5d9f64e2507f85e2bc4a7e86ffa520abfba1a && /host/k3s ctr --address /run/k3s/containerd/containerd.sock --namespace k8s.io images tag docker.io/library/fpct-gpu-r2m:66e4cdd-final2 docker.io/library/fpct-gpu-r2m@sha256:a374ca4c24bd25730d71b45346f5d9f64e2507f85e2bc4a7e86ffa520abfba1a"]
        volumeMounts:
